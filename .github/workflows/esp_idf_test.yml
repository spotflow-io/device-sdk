name: ESP-IDF QEMU Unit Tests

on:
  push:
    branches:
      - main
    paths:
      - 'esp_idf/**'
      - '.github/workflows/esp-idf-test.yml'
  pull_request:
    paths:
      - 'esp_idf/**'
      - '.github/workflows/esp-idf-test.yml'

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  unit-test:
    runs-on: ubuntu-latest

    container:
      image: espressif/idf:release-v5.5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Build unit test app
        run: |
          . /opt/esp/idf/export.sh
          cd esp_idf/spotflow/device_sdk/test/example/unit_test/test
          idf.py set-target esp32
          idf.py build

      - name: Run tests on QEMU and check results
        run: |
          . /opt/esp/idf/export.sh
          cd esp_idf/spotflow/device_sdk/test/example/unit_test/test

          echo "▶ Starting QEMU in background..."

          qemu-system-xtensa \
            -M esp32 \
            -m 4M \
            -drive file=build/qemu_flash.bin,if=mtd,format=raw \
            -drive file=build/qemu_efuse.bin,if=none,format=raw,id=efuse \
            -global driver=nvram.esp32.efuse,property=drive,value=efuse \
            -global driver=timer.esp32.timg,property=wdt_disable,value=true \
            -nic user,model=open_eth \
            -nographic \
            -serial tcp::5556,server,nowait \
            > /tmp/qemu_stderr.txt 2>&1 &
          QEMU_PID=$!
          echo "QEMU PID: $QEMU_PID"

          # Wait until TCP 5556 is accepting connections (up to 30s)
          echo "▶ Waiting for QEMU to bind port 5556..."
          for i in $(seq 1 30); do
            if nc -z localhost 5556 2>/dev/null; then
              echo "✅ QEMU port ready after ${i}s"
              break
            fi
            if ! kill -0 "$QEMU_PID" 2>/dev/null; then
              echo "❌ QEMU process died before port was ready"
              cat /tmp/qemu_stderr.txt
              exit 1
            fi
            sleep 1
          done

          if ! nc -z localhost 5556 2>/dev/null; then
            echo "❌ QEMU port 5556 never became ready"
            cat /tmp/qemu_stderr.txt
            exit 1
          fi

          echo "▶ Reading serial output..."
          touch qemu_output.txt

          timeout 120 bash -c '
            while IFS= read -r line; do
              echo "$line"
              echo "$line" >> qemu_output.txt
              if echo "$line" | grep -qE "^[0-9]+ Tests [0-9]+ Failures [0-9]+ Ignored"; then
                break
              fi
            done < /dev/tcp/localhost/5556
          ' || true

          echo "▶ Stopping QEMU..."
          kill "$QEMU_PID" 2>/dev/null || true
          wait "$QEMU_PID" 2>/dev/null || true

          echo ""
          echo "--- Test Summary ---"
          grep -E "PASS|FAIL|ERROR|Tests|Failures|Ignored" qemu_output.txt || true
          echo "--------------------"

          SUMMARY=$(grep -E "^[0-9]+ Tests [0-9]+ Failures [0-9]+ Ignored" qemu_output.txt | tail -1)

          if [ -z "$SUMMARY" ]; then
            echo "❌ No Unity summary line found — QEMU may have crashed or timed out"
            echo "--- Full QEMU output ---"
            cat qemu_output.txt
            echo "--- QEMU stderr ---"
            cat /tmp/qemu_stderr.txt
            exit 1
          fi

          echo "Unity summary: $SUMMARY"
          FAILURES=$(echo "$SUMMARY" | awk '{print $4}')

          if [ "$FAILURES" -eq 0 ]; then
            echo "✅ All tests passed"
          else
            echo "❌ $FAILURES test(s) failed"
            grep ":FAIL" qemu_output.txt || true
            exit 1
          fi
