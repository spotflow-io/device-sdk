# Boards that support both Wi-Fi and Ethernet use Wi-Fi by default.
# If you want to use Ethernet instead, please use the following option:
# CONFIG_SPOTFLOW_USE_ETH=y

# Enable Spotflow and OTA updates
CONFIG_SPOTFLOW=y
CONFIG_SPOTFLOW_OTA=y

# TODO: Remove once tested against real Spotflow cloud
# (there's no use logging to a test MQTT broker)
CONFIG_SPOTFLOW_LOG_BACKEND=n

# Enable logging
CONFIG_LOG=y

# Show function names in the logs
CONFIG_LOG_FUNC_NAME_PREFIX_INF=y
CONFIG_LOG_FUNC_NAME_PREFIX_WRN=y
CONFIG_LOG_FUNC_NAME_PREFIX_ERR=y

# Log Spotflow module details for debugging
CONFIG_SPOTFLOW_MODULE_DEFAULT_LOG_LEVEL=4

# Satisfy networking dependencies of Spotflow
CONFIG_NETWORKING=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_MGMT_EVENT_INFO=y
CONFIG_NET_CONFIG_AUTO_INIT=n
CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y

# Increase main stack size for the sample
CONFIG_MAIN_STACK_SIZE=4096

# TODO: These values make TLS work, but are probably not optimal, investigate for lower ones and
#       update Kconfig accordingly.
CONFIG_MBEDTLS_SSL_MAX_CONTENT_LEN=16384
CONFIG_IMG_BLOCK_BUF_SIZE=4092
CONFIG_NET_SOCKETS_CONNECT_TIMEOUT=10000
CONFIG_SPOTFLOW_OTA_DOWNLOAD_THREAD_STACK_SIZE=8192
CONFIG_NET_SOCKETS_TLS_MAX_CONTEXTS=4
CONFIG_MBEDTLS_HEAP_SIZE=131072
CONFIG_HEAP_MEM_POOL_ADD_SIZE_SPOTFLOW_OTA=131072
