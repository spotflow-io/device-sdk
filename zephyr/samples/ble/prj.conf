CONFIG_SPOTFLOW=y
CONFIG_SPOTFLOW_TRANSPORT_BLE=y
CONFIG_SPOTFLOW_COREDUMPS=y
CONFIG_SPOTFLOW_LOG_BACKEND=y
CONFIG_SPOTFLOW_METRICS=y
CONFIG_SPOTFLOW_METRICS_HEARTBEAT_INTERVAL=10
CONFIG_SPOTFLOW_METRICS_SYSTEM=y
# limit the the number of threads to avoid overloading the ble transport with
# metric with too many dimensions
CONFIG_SPOTFLOW_METRICS_SYSTEM_STACK_MAX_THREADS=16

CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="Spotflow BLE device"
CONFIG_BT_DEVICE_APPEARANCE=0

CONFIG_DEBUG_COREDUMP_THREADS_METADATA=y
CONFIG_DEBUG_COREDUMP_MEMORY_DUMP_THREADS=y

CONFIG_GPIO=y

CONFIG_SPOTFLOW_DEVICE_ID="testing_device"

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_MAX_LEVEL=4
CONFIG_PRINTK=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_MAIN_STACK_SIZE=2048
